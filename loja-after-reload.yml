ame, Address, Phone): consistente em TODO o site e diretórios ### 1.3 SERVIÇOS — MAPEAMENTO DE TRADUÇÃO E ADAPTAÇÃO | Serviço Espanhol | Serviço Brasil | Adaptações Necessárias | |------------------|----------------|----------------------| | Limpieza de Sofás | **Lavagem de Sofá / Higienização de Sofá** | Termo \"lavagem\" é mais comum no Brasil que \"limpeza\" para sofás. Adicionar \"higienização\" como keyword secundária. | | Impermeabilización de Sofás | **Impermeabilização de Sofá** | Manter termo. Adicionar \"blindagem de sofá\" como sinônimo (muito buscado no Brasil). | | Lavado de Alfombras | **Lavagem de Tapete / Limpeza de Tapete** | \"Tapete\" é mais comum que \"alfombra\" no Brasil. Incluir \"tapete persa\", \"tapete oriental\". | | Limpieza de Colchones | **Higienização de Colchão / Limpeza de Colchão** | \"Higienização\" vende mais no Brasil por associação com ácaros e alergia. | | Limpieza de Sillones | **Limpeza de Poltronas / Limpeza de Poltrona** | \"Sillón\" = poltrona no Brasil. | | Limpieza de Tapicerías | **Limpeza de Estofados / Higienização de Estofados** | Termo abrangente para carros, cadeiras, etc. | | Limpieza Vehículos | **Higienização de Carros / Limpeza de Banco de Carro** | Serviço adicional muito comum no Brasil. | **NOVOS SERVIÇOS para mercado brasileiro (não existem no original):** 1. **Higienização de Carros / Bancos de Carro** — muito demandado no Brasil 2. **Limpeza de Cadeiras de Escritório** — B2B, empresas em Uberaba/Uberlândia 3. **Limpeza de Cortinas** — serviço complementar 4. **Limpeza de Puff e Banquetas** — itens comuns em residências classe média-alta ### 1.4 ESTRUTURA DE PÁGINAS — MAPEAMENTO COMPLETO **Páginas do Original:** 1. `/` — Home 2. `/limpieza-de-sofas` — Serviço Sofá 3. `/impermeabilizacion-de-sofas` — Serviço Impermeabilização 4. `/limpieza-de-alfombras` — Serviço Tapete 5. `/limpieza-de-colchones` — Serviço Colchão 6. `/sobre-nosotros` — Sobre 7. `/contacto` — Contato **Páginas do Novo Site (expandido para 