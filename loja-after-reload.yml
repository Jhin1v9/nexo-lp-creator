ina para páginas relacionadas **Local SEO:** - Google Business Profile: criar, verificar, otimizar - NAP consistente: site, GBP, redes sociais, diretórios - Schema LocalBusiness com geo coordinates - Página `/regiao-de-atendimento` com todas as cidades - Embed Google Maps na página de contato - Reviews no site (Schema Review markup) **AI Search Optimization (2026):** - Conteúdo answer-focused (responde diretamente na primeira frase) - FAQ estruturado com perguntas reais que usuários fazem - Conteúdo em formato de listas e tabelas - Clear step-by-step explanations - Conversational optimization (como as pessoas falam, não só digitam) **Technical:** - XML Sitemap (dinâmico) - Robots.txt otimizado - HTTPS obrigatório - HSTS header - Brotli/Gzip compression - Lazy loading em imagens - WebP/AVIF para imagens - CDN (Cloudflare ou similar) - 301 redirects de www/non-www - 404 page customizada **Content Strategy:** - Blog com 10+ artigos iniciais (evergreen + seasonal) - Topic clusters: página central (serviço) → artigos relacionados (blog) - E-E-A-T signals: autor com bio, foto, credenciais - Atualizações regulares (sinal de freshness) ### 1.7 FUNCIONALIDADES E INTEGRAÇÕES **Obrigatórias:** 1. **WhatsApp Click-to-Chat** — botão flutuante + links em CTAs 2. **Formulário de Orçamento** — nome, telefone, cidade, tipo de serviço, descrição 3. **Google Analytics 4** — com eventos customizados (form_submit, whatsapp_click, phone_click) 4. **Google Tag Manager** — para pixels e tracking futuro 5. **Google Search Console** — verificação e monitoramento 6. **Schema markup** — JSON-LD em todas as páginas **Recomendadas:** 7. **Chatbot** — WhatsApp Business API ou widget simples 8. **Calendly/Agendamento** — para agendamento de visitas 9. **Google Reviews widget** — mostrar reviews do GBP no site 10. **Social proof popup** — \"Maria de Uberaba acabou de solicitar um orçamento\" 11. **Cookie consent banner** — LGPD compliance 12. **Facebook Pixel** — se houver campanhas de ads ### 1.8 