              - generic [ref=e729]: "# 🚀 PLANO MESTRE: CLONAGEM ESTRATÉGICA SUPERCLIM.ES → SITE BRASIL ## Análise Bruta + Plano de Execução + Prompt Completo para Agente Git Bash --- ## PARTE 1: ANÁLISE BRUTA — TUDO QUE PRECISA MUDAR ### 1.1 IDENTIDADE DA MARCA (Mudança Total) | Aspecto | Original (Espanha) | Novo (Brasil) | |---------|-------------------|---------------| | **Nome** | Superclim Servicios | [NOVO NOME A DEFINIR] — sugestões: \"Lav&Clean Uberaba\", \"Higieniza Uberaba\", \"Sofá Novo Uberaba\", \"CleanHome Triângulo\", \"Impermeabiliza Triângulo Mineiro\" | | **Slogan** | \"Especialistas en limpieza y Impermeabilización de sofás y alfombras en Barcelona\" | \"Especialistas em Higienização e Impermeabilização de Sofás e Tapetes em Uberaba e Região\" | | **Cor Primária** | Provavelmente azul/verde (limpeza) | **Sugestão:** Verde-água (#0D9488) + Dourado (#D4AF37) para transmitir classe média-alta | | **Cor Secundária** | Cinza/branco | **Sugestão:** Branco puro + Cinza chumbo (#374151) para contraste elegante | | **Tom de Voz** | Formal, técnico, confiável | **Sugestão:** Sofisticado mas acolhedor, técnico mas acessível, premium mas próximo | | **Logo** | \"Superclim\" | Novo logo com ícone de sofá/proteção + nome da marca | ### 1.2 LOCALIZAÇÃO E GEO-TARGETING (Mudança Crítica para SEO Local) **Original:** Barcelona, Sabadell, Catalunha, Espanha **Novo:** Uberaba, Minas Gerais, Brasil + Região de atendimento **Cidades para geo-targeting:** - **Primária:** Uberaba (MG) — sede principal - **Secundárias:** Uberlândia (MG), Araguari (MG), Delta (MG), Conceição das Alagoas (MG), Campo Florido (MG), Prata (MG), Abadia dos Dourados (MG), Veríssimo (MG) - **Raio máximo:** 100km de Uberaba **Mudanças em cada página:** - Todos os títulos H1/H2 devem incluir \"Uberaba\" ou \"Triângulo Mineiro\" - Meta titles: \"Lavagem de Sofá Uberaba | [Nome Marca]\" - Schema.org LocalBusiness: address → Uberaba, MG - Google Business Profile: criar e otimizar para Uberaba - NAP (Name, Address, Phone): consistente em TODO o site e diretórios ### 1.3 SERVIÇOS — MAPEAMENTO DE TRADUÇÃO E ADAPTAÇÃO | Serviço Espanhol | Serviço Brasil | Adaptações Necessárias | |------------------|----------------|----------------------| | Limpieza de Sofás | **Lavagem de Sofá / Higienização de Sofá** | Termo \"lavagem\" é mais comum no Brasil que \"limpeza\" para sofás. Adicionar \"higienização\" como keyword secundária. | | Impermeabilización de Sofás | **Impermeabilização de Sofá** | Manter termo. Adicionar \"blindagem de sofá\" como sinônimo (muito buscado no Brasil). | | Lavado de Alfombras | **Lavagem de Tapete / Limpeza de Tapete** | \"Tapete\" é mais comum que \"alfombra\" no Brasil. Incluir \"tapete persa\", \"tapete oriental\". | | Limpieza de Colchones | **Higienização de Colchão / Limpeza de Colchão** | \"Higienização\" vende mais no Brasil por associação com ácaros e alergia. | | Limpieza de Sillones | **Limpeza de Poltronas / Limpeza de Poltrona** | \"Sillón\" = poltrona no Brasil. | | Limpieza de Tapicerías | **Limpeza de Estofados / Higienização de Estofados** | Termo abrangente para carros, cadeiras, etc. | | Limpieza Vehículos | **Higienização de Carros / Limpeza de Banco de Carro** | Serviço adicional muito comum no Brasil. | **NOVOS SERVIÇOS para mercado brasileiro (não existem no original):** 1. **Higienização de Carros / Bancos de Carro** — muito demandado no Brasil 2. **Limpeza de Cadeiras de Escritório** — B2B, empresas em Uberaba/Uberlândia 3. **Limpeza de Cortinas** — serviço complementar 4. **Limpeza de Puff e Banquetas** — itens comuns em residências classe média-alta ### 1.4 ESTRUTURA DE PÁGINAS — MAPEAMENTO COMPLETO **Páginas do Original:** 1. `/` — Home 2. `/limpieza-de-sofas` — Serviço Sofá 3. `/impermeabilizacion-de-sofas` — Serviço Impermeabilização 4. `/limpieza-de-alfombras` — Serviço Tapete 5. `/limpieza-de-colchones` — Serviço Colchão 6. `/sobre-nosotros` — Sobre 7. `/contacto` — Contato **Páginas do Novo Site (expandido para 